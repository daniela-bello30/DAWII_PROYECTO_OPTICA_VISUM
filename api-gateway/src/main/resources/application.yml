server:
  port: 8080

spring:
  application:
    name: api-gateway

  # ── DESHABILITAR CONFIG SERVER (causa del error)
  cloud:
    config:
      enabled: false          # ← LÍNEA QUE FALTABA
      import-check:
        enabled: false        # ← POR SI ACASO, doble seguro

    gateway:
      routes:
        # ── MS-SEGURIDAD: Endpoints públicos (sin filtro JWT)
        - id: ms-seguridad-auth-publico
          uri: http://localhost:8084
          predicates:
            - Path=/api/auth/login,/api/auth/register,/api/auth/refresh
          filters:
            - StripPrefix=1

        # ── MS-SEGURIDAD: Endpoints protegidos (con filtro JWT)
        - id: ms-seguridad-auth-protegido
          uri: http://localhost:8084
          predicates:
            - Path=/api/auth/validate-token,/api/auth/logout
          filters:
            - StripPrefix=1
            - AuthenticationFilter

        - id: ms-seguridad-usuarios
          uri: http://localhost:8084
          predicates:
            - Path=/api/usuarios/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter

        - id: ms-seguridad-roles
          uri: http://localhost:8084
          predicates:
            - Path=/api/roles/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter

        # ═══════════════════════════════════════════
        # MS-VENTAS (NUEVO - AGREGAR ESTO)
        # ═══════════════════════════════════════════
        - id: ms-ventas-carrito
          uri: http://localhost:8082
          predicates:
            - Path=/api/carrito/**
          filters:
            - AuthenticationFilter

        - id: ms-ventas-pedidos
          uri: http://localhost:8082
          predicates:
            - Path=/api/pedidos/**
          filters:
            - AuthenticationFilter

        - id: ms-ventas-direcciones
          uri: http://localhost:8082
          predicates:
            - Path=/api/direcciones/**
          filters:
            - AuthenticationFilter

        - id: ms-ventas-metodos-pago
          uri: http://localhost:8082
          predicates:
            - Path=/api/metodos-pago/**
          filters:
            - AuthenticationFilter
        # ─────────────────────────────
        # MS-CITAS
        # ─────────────────────────────
        - id: ms-citas
          uri: http://localhost:8083
          predicates:
            - Path=/api/citas/**
          filters:
            - StripPrefix=1
            - AuthenticationFilter
        # ═════════════════════════════
        # MS-CATALOGO
        # ═════════════════════════════

        # Productos (puede dejarse público si tu negocio lo permite)
        - id: ms-catalogo-productos
          uri: http://localhost:8081
          predicates:
            - Path=/api/productos/**
          filters:
        - AuthenticationFilter   # Activar si deseas proteger catálogo

        # Categorías
        - id: ms-catalogo-categorias
          uri: http://localhost:8081
          predicates:
            - Path=/api/categorias/**
          filters:
        - AuthenticationFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

ms-seguridad:
  url: http://localhost:8084
  validate-token-endpoint: /auth/validate-token

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: false
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    pe.edu.cibertec.gateway: DEBUG
    org.springframework.security: DEBUG
