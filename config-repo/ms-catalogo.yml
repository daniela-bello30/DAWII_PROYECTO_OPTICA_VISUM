# ============================================
# MS-CATALOGO - Configuración específica
# Archivo: config-repo/ms-catalogo.yml
# ============================================

server:
  port: 8081

spring:
  application:
    name: ms-catalogo

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/catalogo_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA/Hibernate
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging
logging:
  level:
    pe.edu.cibertec.catalogo: DEBUG
    org.springframework.amqp: DEBUG