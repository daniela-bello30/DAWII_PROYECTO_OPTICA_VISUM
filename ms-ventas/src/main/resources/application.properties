# ===================================
# MS-VENTAS - CONFIGURATION
# ===================================

server.port=8082
spring.application.name=ms-ventas

# DATABASE - POSTGRESQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ventas_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# RABBITMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# FEIGN
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
feign.circuitbreaker.enabled=true

# RESILIENCE4J
resilience4j.circuitbreaker.instances.catalogoClient.sliding-window-size=10
resilience4j.circuitbreaker.instances.catalogoClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.catalogoClient.wait-duration-in-open-state=10000

# SWAGGER
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# LOGGING
logging.level.pe.edu.cibertec.msventas=INFO
logging.level.pe.edu.cibertec.msventas.feign=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n