spring:
  application:
    name: ms-catalogo  

  cloud:
    config:

      uri: http://localhost:8888
      fail-fast: false

      retry:
        max-attempts: 3
        initial-interval: 1000
        max-interval: 3000
  security:
    oauth2:
          resourceserver:
            jwt:
              issuer-uri: http://localhost:8080/realms/mycompany-microservices-realm

