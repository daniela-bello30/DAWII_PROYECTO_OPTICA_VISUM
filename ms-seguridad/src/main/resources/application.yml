server:
  port: 8084

spring:
  application:
    name: ms-seguridad

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db?stringtype=unspecified
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ============================================
  # CONFIGURACIÓN DE SEGURIDAD
  # ============================================
  security:
    user:
      name: admin
      password: admin123

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ============================================
# CONFIGURACIÓN JWT - SEMANA 5
# ============================================
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000  # 24 horas en milisegundos
  refresh-expiration: 604800000  # 7 días en milisegundos

# URLs públicas (no requieren autenticación)
security:
  public-urls:
    - /auth/login
    - /auth/register
    - /auth/refresh
    - /actuator/**
    - /h2-console/**
    - /swagger-ui/**
    - /v3/api-docs/**

# ============================================
# CONFIGURACIÓN SWAGGER / SPRINGDOC OPENAPI
# ============================================
springdoc:
  api-docs:
    path: /api-docs                    # Ruta de la documentación JSON
    enabled: true

  swagger-ui:
    path: /swagger-ui.html             # Ruta de la interfaz Swagger UI
    enabled: true
    operations-sorter: method          # Ordenar por método HTTP (GET, POST, etc.)
    tags-sorter: alpha                 # Ordenar tags alfabéticamente
    try-it-out-enabled: true           # Habilitar el botón "Try it out"
    filter: true                       # Habilitar filtro de búsqueda

    # Configuración de visualización
    display-request-duration: true
    default-models-expand-depth: 2
    default-model-expand-depth: 2

  # Configuración de rutas a documentar
  paths-to-match:
    - /auth/**
    - /usuarios/**
    - /roles/**

  # Mostrar solo endpoints exitosos en los ejemplos
  show-actuator: false

# ============================================
# CONFIGURACIÓN DE LOGGING
# ============================================
logging:
  level:
    pe.edu.cibertec.msseguridad: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
