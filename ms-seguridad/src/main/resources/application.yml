server:
  port: 8084

spring:
  application:
    name: ms-seguridad

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: Konecta1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ============================================
  # NUEVA CONFIGURACIÓN AGREGADA EN SEMANA 5
  # ============================================
  security:
    user:
      name: admin
      password: admin123

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: false
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ============================================
# NUEVA CONFIGURACIÓN JWT - SEMANA 5
# ============================================
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000  # 24 horas en milisegundos
  refresh-expiration: 604800000  # 7 días en milisegundos

# URLs públicas (no requieren autenticación)
security:
  public-urls:
    - /auth/login
    - /auth/register
    - /auth/refresh
    - /actuator/**
    - /h2-console/**

logging:
  level:
    pe.edu.cibertec.seguridad: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # NUEVO: Logging de seguridad
    org.springframework.security: DEBUG
