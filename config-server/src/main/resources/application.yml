server:
  port: 8888

spring:
  application:
    name: config-server

  profiles:
    active: native

  cloud:
    config:
      server:
        git:
          # Apuntar a la carpeta config-repo en la ra�z del proyecto
          uri: file:///${user.dir}/../config-repo
          clone-on-start: true
          search-paths:
            - '{application}'

# Eureka Client
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    org.springframework.cloud.config: DEBUG

# ============================================
# PERFIL DOCKER
# ============================================
---
spring:
  config:
    activate:
      on-profile: docker

  cloud:
    config:
      server:
        git:
          uri: file:///config-repo

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/